services:
  api:
    image: ashish8927/ecommerce-backend:latest
    restart: unless-stopped
    # Runtime config comes from /opt/ecommerce-backend/.env on the VPS.
    # The .env is NOT baked into the image (see .dockerignore).
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
    # Bind only to localhost — nginx terminates TLS and reverse-proxies to it.
    # Never expose 5000 publicly.
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No published ports — Redis is reachable only on the internal compose
    # network as host "redis". Keeps it off the public internet.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
